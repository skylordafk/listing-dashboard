<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Monitor frame -->
  <rect x="2" y="4" width="28" height="20" rx="2" fill="#1f2328"/>
  <!-- Screen -->
  <rect x="4" y="6" width="24" height="16" rx="1" fill="#fff"/>
  <!-- Dashboard grid: 3 stat boxes across the top -->
  <rect x="5.5" y="7.5" width="6.5" height="4" rx="0.5" fill="#ddf4ff"/>
  <rect x="13" y="7.5" width="6.5" height="4" rx="0.5" fill="#dafbe1"/>
  <rect x="20.5" y="7.5" width="6.5" height="4" rx="0.5" fill="#fff1e5"/>
  <!-- Bar chart in lower area -->
  <rect x="6" y="18" width="3" height="3" fill="#0969da"/>
  <rect x="10" y="16" width="3" height="5" fill="#0969da"/>
  <rect x="14" y="14" width="3" height="7" fill="#0969da"/>
  <rect x="18" y="15" width="3" height="6" fill="#0969da"/>
  <rect x="22" y="13" width="3" height="8" fill="#1a7f37"/>
  <!-- Monitor stand -->
  <rect x="13" y="24" width="6" height="2" rx="0.5" fill="#1f2328"/>
  <rect x="10" y="26" width="12" height="2" rx="1" fill="#1f2328"/>
</svg>
